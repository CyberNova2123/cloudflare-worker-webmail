<!DOCTYPE html>
<!-- ============================================================================
     魔法纪录复兴计划 WebMail — single-page client served by a Cloudflare Worker.
     ----------------------------------------------------------------------------
     Claude Code — serving this from a Worker:
       • Serve this HTML at "/" (and SPA-fallback unknown non-/api routes to it).
       • Mount the JSON API under CONFIG.api.baseUrl ("/api"); see api.jsx for the
         full endpoint list + payload shapes.
       • Gate everything behind a Cloudflare Access application so requests carry
         the CF_Authorization cookie. The frontend never stores a token.
       • Bind Email Service's SEND_EMAIL binding for POST /api/messages/send, and
         add an email() handler (Email Routing) to ingest + persist inbound mail.
       • For production, bundle the .jsx files (esbuild) instead of shipping Babel
         in the browser. The in-browser Babel below is for the prototype only.
     ========================================================================== -->
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>魔法纪录复兴计划 WebMail</title>
  <meta name="color-scheme" content="light dark" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Design system -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (prototype only — see note above) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Plain-JS config + API layer (no JSX) -->
  <script src="config.jsx"></script>
  <script src="api.jsx"></script>
  <script>document.title = window.CONFIG.brand.name;</script>

  <!-- React components (JSX, transpiled in order) -->
  <script type="text/babel" src="ui.jsx" data-presets="react"></script>
  <script type="text/babel" src="auth.jsx" data-presets="react"></script>
  <script type="text/babel" src="mail.jsx" data-presets="react"></script>
  <script type="text/babel" src="compose.jsx" data-presets="react"></script>
  <script type="text/babel" src="settings.jsx" data-presets="react"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
